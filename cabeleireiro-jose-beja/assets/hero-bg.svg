<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a14;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1526;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a0d;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#b8860b;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect width="1440" height="900" fill="url(#glow)"/>
  <!-- Decorative scissors silhouette lines -->
  <g opacity="0.06" stroke="#c9a84c" stroke-width="1" fill="none">
    <line x1="0" y1="200" x2="1440" y2="200"/>
    <line x1="0" y1="400" x2="1440" y2="400"/>
    <line x1="0" y1="600" x2="1440" y2="600"/>
    <line x1="0" y1="800" x2="1440" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>
</svg>